{% extends "base.html" %}

{% block content %}
<header class="page-heading">
  <h1>{{ taxonomy.name | title }}</h1>
</header>

<ul class="taxonomy-list">
  {% for term in terms %}
    <li>
      <a href="{{ term.permalink }}">{{ term.name }}</a>
      <span>{{ term.pages | length }}</span>
    </li>
  {% endfor %}
</ul>
{% endblock content %}
